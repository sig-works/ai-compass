name: update-ai-news

on:
  workflow_dispatch:
  schedule:
    # 06:00, 12:00, 18:00 JST
    - cron: '0 21,3,9 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update AI news
        run: npm run update:ai-news

      - name: Commit updated news
        run: |
          if [[ -n "$(git status --porcelain src/data/ai-news.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/ai-news.json
            git commit -m "Update AI news"
            git push
          else
            echo "No AI news changes"
          fi
