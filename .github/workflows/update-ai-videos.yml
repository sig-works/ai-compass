name: update-ai-videos

on:
  workflow_dispatch:
  schedule:
    # 07:30 JST
    - cron: '30 22 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-videos-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update AI videos
        run: npm run update:ai-videos

      - name: Commit updated videos
        id: commit
        run: |
          if [[ -n "$(git status --porcelain src/data/ai-videos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/ai-videos.json
            git commit -m "Update AI videos"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No AI video changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Check site
        if: steps.commit.outputs.changed == 'true'
        run: npm run check:site

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
