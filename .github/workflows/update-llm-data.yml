name: update-llm-data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update LLM data
        run: npm run update:llm-data

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain public/data/llm-latest.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/llm-latest.json
            git commit -m "Update LLM latest data"
            git push
          else
            echo "No LLM data changes"
          fi
